data:
  raw_data_path: data/raw/train.csv

split:
  method: date
  split_date: "2015-04-30"
  validation_days: 90

logging:
  level: INFO

features:
  calendar: true
  lag: true
  rolling: true
  promo: true

model:
  name: hist_gradient_boosting

inference:
  data_path: data/inference/future_data.csv
  required_columns:
    - Store
    - DayOfWeek
    - Date
    - Open
    - Promo
    - StateHoliday
    - SchoolHoliday