data:
  raw_data_path: data/raw/train.csv

split:
  method: date
  split_date: "2015-04-30"
  validation_days: 90

logging:
  level: INFO

features:
  calendar: true
  lag: true
  rolling: true
  promo: true

model:
  name: hist_gradient_boosting

inference:
  data_path: data/inference/future_data.csv
  history_window_days: 14

drift:
  z_score_threshold: 3.0

governance:
  alerts:
    consecutive_drift_threshold: 3
    critical_drift_threshold: 5